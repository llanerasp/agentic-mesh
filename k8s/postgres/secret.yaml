apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: llm-agent
type: Opaque
stringData:
  # En produccion real estos secretos vienen de un secret manager (AWS Secrets Manager,
  # Vault, Sealed Secrets...). Para demo local son suficientes.
  POSTGRES_USER: llm_agent
  POSTGRES_PASSWORD: llm_agent
  POSTGRES_DB: llm_agent
