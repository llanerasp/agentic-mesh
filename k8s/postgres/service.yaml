# Headless service para el StatefulSet (DNS estable por pod).
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: llm-agent
  labels:
    app.kubernetes.io/name: postgres
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
---
# Service regular con ClusterIP para que los otros servicios conecten por "postgres:5432".
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: llm-agent
  labels:
    app.kubernetes.io/name: postgres
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
