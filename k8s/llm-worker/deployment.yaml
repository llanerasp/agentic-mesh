apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-worker
  namespace: llm-agent
  labels:
    app.kubernetes.io/name: llm-worker
    app.kubernetes.io/component: microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-worker
        app.kubernetes.io/component: microservice
    spec:
      containers:
        - name: llm-worker
          image: llm-agent/llm-worker:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3003
              name: http
          envFrom:
            - configMapRef:
                name: llm-worker-config
            - secretRef:
                name: llm-worker-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3003
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 384Mi
