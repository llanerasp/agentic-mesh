apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: llm-agent
data:
  NODE_ENV: production
  LOG_LEVEL: info
  GATEWAY_PORT: '3001'
  CONVERSATION_SERVICE_URL: http://conversation:3002
  LLM_WORKER_URL: http://llm-worker:3003
  RATE_LIMIT_WINDOW_MS: '60000'
  RATE_LIMIT_MAX: '60'
  HTTP_TIMEOUT_MS: '5000'
  LLM_HTTP_TIMEOUT_MS: '30000'
  OTEL_SERVICE_NAME: gateway
  OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
  OTEL_RESOURCE_ATTRIBUTES: service.version=0.1.0,deployment.environment=local
