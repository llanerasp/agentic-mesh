apiVersion: v1
kind: Secret
metadata:
  name: conversation-secrets
  namespace: llm-agent
type: Opaque
stringData:
  # La URL se construye con credenciales del secret de Postgres. En un entorno
  # real se generaria via SealedSecrets o external-secrets.
  DATABASE_URL: postgresql://llm_agent:llm_agent@postgres:5432/llm_agent?schema=public
