apiVersion: apps/v1
kind: Deployment
metadata:
  name: conversation
  namespace: llm-agent
  labels:
    app.kubernetes.io/name: conversation
    app.kubernetes.io/component: microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: conversation
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: conversation
        app.kubernetes.io/component: microservice
    spec:
      # Espera a que Postgres este listo antes de arrancar (aparte de readiness).
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -p 5432 -U llm_agent; do
                echo "esperando postgres..."; sleep 2
              done
      containers:
        - name: conversation
          image: llm-agent/conversation:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - configMapRef:
                name: conversation-config
            - secretRef:
                name: conversation-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
