name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela ejecuciones anteriores en la misma PR/rama si hay un push nuevo.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (lint + format + typecheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Lint (ESLint, max-warnings=0)
        run: npm run lint

      # Typecheck se activa cuando haya al menos un workspace con TS.
      # Por ahora esta comentado; se activa en Fase 1.
      # - name: Typecheck (tsc --noEmit)
      #   run: npm run typecheck

      # Tests se activan en Fase 1 cuando existan.
      # - name: Tests
      #   run: npm test
