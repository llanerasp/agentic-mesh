services:
  postgres:
    image: postgres:16-alpine
    container_name: llm-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: llm_agent
      POSTGRES_PASSWORD: llm_agent
      POSTGRES_DB: llm_agent
    ports:
      # 5433 en host para no chocar con una instalacion local de Postgres (5432).
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U llm_agent -d llm_agent']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - llm-agent

  conversation:
    build:
      context: .
      dockerfile: services/conversation/Dockerfile
    container_name: llm-agent-conversation
    restart: unless-stopped
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      CONVERSATION_PORT: 3001
      DATABASE_URL: postgresql://llm_agent:llm_agent@postgres:5432/llm_agent?schema=public
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - llm-agent

  llm-worker:
    build:
      context: .
      dockerfile: services/llm-worker/Dockerfile
    container_name: llm-agent-llm-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      LLM_WORKER_PORT: 3002
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5}
      ANTHROPIC_MAX_TOKENS: ${ANTHROPIC_MAX_TOKENS:-512}
    ports:
      - '3002:3002'
    networks:
      - llm-agent

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: llm-agent-gateway
    restart: unless-stopped
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      GATEWAY_PORT: 3000
      CONVERSATION_SERVICE_URL: http://conversation:3001
      LLM_WORKER_URL: http://llm-worker:3002
    ports:
      - '3000:3000'
    depends_on:
      - conversation
      - llm-worker
    networks:
      - llm-agent

volumes:
  postgres_data:

networks:
  llm-agent:
    driver: bridge
